name: Automated Code Review

# 1. Trigger: Chỉ chạy khi có người tạo Pull Request đòi gộp vào nhánh main/master
on:
  pull_request:
    branches: [ "main", "master" ]

jobs:
  pr-bot-review:
    runs-on: ubuntu-latest
    # QUAN TRỌNG: Phải cấp quyền thì Bot mới có thể đăng bình luận lên GitHub
    permissions:
      pull-requests: write 
      contents: read
      checks: write
      
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Chạy công cụ soi lỗi Checkstyle
      working-directory: ./Bai07
      # Lệnh này yêu cầu Maven quét code và sinh ra file báo cáo XML
      run: mvn checkstyle:checkstyle
      continue-on-error: true # Bắt buộc phải có để bước dưới vẫn được chạy dù code có lỗi

    - name: Bot tự động bình luận lỗi vào code (Inline Feedback)
      uses: dbelyaev/action-checkstyle@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        reporter: github-pr-review
        # Trỏ đường dẫn vào file báo cáo vừa sinh ra ở bước trên
        checkstyle_report: Bai07/target/checkstyle-result.xml