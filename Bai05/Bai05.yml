name: Test Coverage Pipeline

on:
  push:
    branches: [ "main", "master" ]

jobs:
  coverage-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # ĐỔI LỆNH: Dùng 'mvn verify' để kích hoạt luật check của JaCoCo
    - name: Chạy Test và Kiểm tra Độ bao phủ
      working-directory: ./Bai05
      run: mvn clean verify

    # TẢI BÁO CÁO VỀ: Trích xuất thư mục chứa HTML
    - name: Upload JaCoCo Coverage Report
      # Thêm điều kiện này để dù test fail (dưới 80%), báo cáo vẫn được lấy về để xem
      if: always() 
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-html-report
        path: Bai05/target/site/jacoco/