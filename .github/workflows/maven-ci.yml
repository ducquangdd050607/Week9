name: Matrix OS Testing Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-multi-os:
    # 1. Bật chiến lược Matrix cho 3 hệ điều hành
    strategy:
      fail-fast: false # Quan trọng: Để false thì 1 máy lỗi, 2 máy kia vẫn chạy tiếp để lấy kết quả
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    # 2. Gán biến hệ điều hành vào máy chủ
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    # 3. Trỏ đường dẫn vào ĐÚNG thư mục Bài 04
    - name: Run Tests on Multiple OS
      working-directory: ./Bai04
      run: mvn clean test