name: Maven CI Pipeline

# 1. Kích hoạt (trigger) khi có sự kiện push và pull_request
on:
  push:
    branches: [ "main", "master" ] # Thay bằng tên nhánh của bạn nếu cần
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest # Chạy trên máy chủ Ubuntu ảo của GitHub

    steps:
    # Bước 1: Lấy code từ repository của bạn về máy ảo
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # Bước 2: Cài đặt Java (Ở đây dùng Java 17 giống cấu hình pom.xml của bạn)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven' # Giúp lưu cache thư viện, build lần sau sẽ nhanh hơn

    # Bước 3: Thực thi vòng đời build của Maven
    - name: Build and Test with Maven
      working-directory: ./Bai02 # Báo cho GitHub biết phải "cd" vào Bai02 rồi mới chạy lệnh
      run: mvn clean package

    # Bước 4: Lưu giữ và xác minh tệp .jar
    - name: Upload JAR Artifact
      uses: actions/upload-artifact@v4
      with:
        name: compiled-application-jar
        path: Bai02/target/*.jar # Cập nhật lại đường dẫn vì thư mục target giờ nằm trong Bai02